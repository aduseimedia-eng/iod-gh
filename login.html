<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoD Ghana - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
                background: #2C1972;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            max-width: 90vw;
                box-shadow: 0 25px 60px rgba(44, 25, 114, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 8px 25px rgba(26, 54, 93, 0.3);
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        .logo-section h1 {
            font-size: 22px;
                color: #2C1972;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo-section p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper > i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
                background: #2C1972;
            border-radius: 12px;
            font-size: 15px;
            color: #2d3748;
            background: #f7fafc;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #2b6cb0;
            background: white;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: #2b6cb0;
        }

        #password {
            padding-right: 52px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #2b6cb0;
        }

        .toggle-password i {
            position: static;
            transform: none;
            color: inherit;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 54, 93, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .spinner { display: inline-block; }
        .login-btn.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fff5f5;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fed7d7;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show { display: block; }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #a0aec0;
            font-size: 12px;
        }

        .footer-text i { color: #e53e3e; }

        .staff-dashboard-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px 15px;
            margin-top: 18px;
            background: #f7fafc;
            color: #2C1972;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
        }

        .staff-dashboard-link:hover {
            background: #edf2f7;
            border-color: #2b6cb0;
            color: #1a365d;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44, 25, 114, 0.15);
        }

        .staff-dashboard-link:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon" style="margin-bottom: 0.5rem;">
                <img src="IoD_Logo_png.png" alt="IoD-Ghana Logo" width="75" height="75" style="display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 2px 8px rgba(18,8,111,0.08); background: #fff; border: 2px solid #1a365d; padding: 4px;" />
            </div>
            <h1>Institute of Directors-Ghana</h1>
            <p>Member Database Management System</p>
        </div>

        <div class="error-message" id="error-msg">
            <i class="fas fa-exclamation-circle"></i> <span id="error-text"></span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="off">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="off">
                    <i class="fas fa-lock"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="login-btn">
                <span class="btn-text">Sign In</span>
                <div class="spinner"></div>
            </button>
        </form>

        <a href="/staff-dashboard.html" class="staff-dashboard-link">
            <i class="fas fa-eye"></i>
            Staff View-Only Dashboard
        </a>

        <div class="footer-text">
            <i class="fas fa-lock"></i> Secure access &bull; Authorized personnel only
        </div>
    </div>

    <script src="api-client.js"></script>
    <script>
        // Check if already logged in
        fetch('/api/auth-status')
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) window.location.href = appUrl('');
            })
            .catch(() => {});

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.classList.add('loading');
            btn.disabled = true;
            errorMsg.classList.remove('show');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = appUrl('');
                } else {
                    errorText.textContent = data.error || 'Invalid username or password';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorText.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('login-form').requestSubmit();
        });
    </script>
</body>
</html>
